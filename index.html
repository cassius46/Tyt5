<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TYT Takip</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#070910;color:#cdd9e5;font-family:system-ui,sans-serif}

.navbar{position:sticky;top:0;z-index:99;background:#070910;border-bottom:1px solid #1e2d3d;padding:12px}
.tabs{display:flex;gap:8px;overflow-x:auto}
.tab{padding:10px 16px;border:1px solid #1e2d3d;background:#111820;color:#5a7a8a;border-radius:6px;cursor:pointer;white-space:nowrap;font-weight:600;font-size:.85rem}
.tab.active{background:#3ddc97;color:#070910;border-color:#3ddc97}

.container{padding:14px;max-width:600px;margin:0 auto;padding-bottom:100px}

.page{display:none}
.page.show{display:block}

.card{background:#111820;border:1px solid #1e2d3d;border-radius:12px;padding:14px;margin-bottom:12px}
.card-title{font-size:.65rem;color:#5a7a8a;text-transform:uppercase;font-weight:700;margin-bottom:10px}

.form-group{margin-bottom:10px}
.form-group label{display:block;font-size:.65rem;color:#5a7a8a;text-transform:uppercase;font-weight:600;margin-bottom:4px}
.form-group input,
.form-group textarea{width:100%;padding:10px;background:#070910;border:1px solid #1e2d3d;border-radius:6px;color:#cdd9e5;font-family:inherit}
.form-group input:focus,
.form-group textarea:focus{border-color:#3ddc97;outline:none}

.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}

.btn{padding:10px 16px;border:none;border-radius:6px;font-weight:700;cursor:pointer;font-size:.85rem;font-family:inherit}
.btn-green{background:#3ddc97;color:#070910}
.btn-gray{background:#161f2b;color:#5a7a8a;border:1px solid #1e2d3d}
.btn-red{background:rgba(255,92,106,.1);color:#ff5c6a;border:1px solid rgba(255,92,106,.2);padding:6px 12px;font-size:.75rem}

.buttons{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}

.item{display:flex;align-items:center;gap:8px;padding:10px;background:#0d1117;border:1px solid #1e2d3d;border-radius:6px;margin-bottom:6px}
.item-count{background:#3ddc9718;color:#3ddc97;padding:2px 6px;border-radius:12px;font-size:.7rem;font-weight:700;flex-shrink:0}
.item-name{flex:1;font-size:.82rem}
.item-del{background:rgba(255,92,106,.1);color:#ff5c6a;border:1px solid rgba(255,92,106,.2);padding:4px 8px;font-size:.7rem;cursor:pointer;border-radius:4px;font-weight:700;font-family:inherit}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#111820;border:1px solid #3ddc97;color:#3ddc97;padding:10px 20px;border-radius:8px;font-weight:700;font-size:.8rem;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

table{width:100%;border-collapse:collapse;font-size:.75rem}
th{text-align:left;padding:8px;border-bottom:1px solid #1e2d3d;font-weight:700;color:#5a7a8a}
td{padding:8px;border-bottom:1px solid #1e2d3d}
</style>

</head>
<body>

<div class="navbar">
  <div style="font-weight:900;color:#3ddc97;margin-bottom:10px;font-size:1.1rem">📊 TYT TAKIP</div>
  <div class="tabs">
    <button class="tab active" onclick="openTab('dash')">Dashboard</button>
    <button class="tab" onclick="openTab('entry')">Giriş</button>
    <button class="tab" onclick="openTab('topics')">Konular</button>
    <button class="tab" onclick="openTab('goals')">Hedefler</button>
    <button class="tab" onclick="openTab('study')">Çalışma</button>
    <button class="tab" onclick="openTab('history')">Geçmiş</button>
  </div>
</div>

<div class="container">

<!-- DASHBOARD -->

<div class="page show" id="dash">
  <div class="card">
    <div style="font-size:.65rem;color:#5a7a8a;text-transform:uppercase;margin-bottom:6px">Son Toplam Net</div>
    <div id="d-total" style="font-size:2.2rem;font-weight:900;color:#3ddc97;margin-bottom:10px">—</div>
    <div style="display:flex;justify-content:space-between;font-size:.7rem;color:#5a7a8a;margin-bottom:4px">
      <span>Hedefe İlerleme</span>
      <span id="d-pct">—</span>
    </div>
    <div style="background:#1e2d3d;height:4px;border-radius:2px;overflow:hidden;margin-bottom:8px">
      <div id="d-prog" style="height:100%;background:#3ddc97;width:0%;transition:width .4s"></div>
    </div>
    <div style="font-size:.65rem;color:#5a7a8a">Hedef: <span id="d-goal">—</span> net</div>
  </div>

  <div id="d-subjects" style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px"></div>

  <div class="card">
    <div class="card-title">En Çok Yanlış Konular</div>
    <div id="d-weak"></div>
  </div>
</div>

<!-- GİRİŞ -->

<div class="page" id="entry">
  <div class="card">
    <div class="card-title">Deneme Bilgileri</div>
    <div class="row2">
      <div class="form-group">
        <label>Tarih</label>
        <input type="date" id="entry-date">
      </div>
      <div class="form-group">
        <label>Deneme Adı</label>
        <input type="text" id="entry-name" placeholder="Opsiyonel">
      </div>
    </div>
  </div>

  <div id="entry-subjects"></div>

  <div class="card">
    <div class="card-title">Çalışma Süresi (dakika)</div>
    <div class="row2">
      <div class="form-group">
        <label style="color:#3ddc97">Matematik</label>
        <input type="number" id="st-mat" min="0" placeholder="0">
      </div>
      <div class="form-group">
        <label style="color:#ff5c6a">Türkçe</label>
        <input type="number" id="st-tur" min="0" placeholder="0">
      </div>
      <div class="form-group">
        <label style="color:#ffb340">Sosyal</label>
        <input type="number" id="st-sos" min="0" placeholder="0">
      </div>
      <div class="form-group">
        <label style="color:#58b4ff">Fen</label>
        <input type="number" id="st-fen" min="0" placeholder="0">
      </div>
    </div>
  </div>

  <div class="buttons">
    <button class="btn btn-green" onclick="saveEntry()">💾 Kaydet</button>
    <button class="btn btn-gray" onclick="clearEntryForm()">Temizle</button>
  </div>
</div>

<!-- KONULAR -->

<div class="page" id="topics">
  <div id="topics-cont"></div>
</div>

<!-- HEDEFLER -->

<div class="page" id="goals">
  <div class="card">
    <div class="card-title">Hedef Belirle</div>
    <div class="row2">
      <div class="form-group">
        <label style="color:#3ddc97">Matematik</label>
        <input type="number" id="g-mat" min="0" max="40" placeholder="0">
      </div>
      <div class="form-group">
        <label style="color:#ff5c6a">Türkçe</label>
        <input type="number" id="g-tur" min="0" max="40" placeholder="0">
      </div>
      <div class="form-group">
        <label style="color:#ffb340">Sosyal</label>
        <input type="number" id="g-sos" min="0" max="20" placeholder="0">
      </div>
      <div class="form-group">
        <label style="color:#58b4ff">Fen</label>
        <input type="number" id="g-fen" min="0" max="20" placeholder="0">
      </div>
    </div>
    <button class="btn btn-green" onclick="saveGoals()">Kaydet</button>
  </div>
  <div id="goals-display"></div>
</div>

<!-- ÇALIŞMA -->

<div class="page" id="study">
  <div id="study-cards"></div>
</div>

<!-- GEÇMİŞ -->

<div class="page" id="history">
  <div class="card">
    <table id="hist"></table>
  </div>
</div>

</div>

<div class="toast" id="toast"></div>

<script>
var DB_KEY='tyt_app';
var SUBJECTS=[
  {k:'mat',n:'Matematik',c:'#3ddc97',m:40},
  {k:'tur',n:'Türkçe',c:'#ff5c6a',m:40},
  {k:'sos',n:'Sosyal',c:'#ffb340',m:20},
  {k:'fen',n:'Fen',c:'#58b4ff',m:20}
];

function openTab(name){
  var tabs=document.querySelectorAll('.tab');
  var pages=document.querySelectorAll('.page');
  
  tabs.forEach(t=>t.classList.remove('active'));
  pages.forEach(p=>p.classList.remove('show'));
  
  event.target.classList.add('active');
  document.getElementById(name).classList.add('show');
  
  if(name==='dash')updateDash();
  if(name==='topics')buildTopics();
  if(name==='goals')updateGoals();
  if(name==='study')updateStudy();
  if(name==='history')updateHistory();
}

function toast(msg){
  var el=document.getElementById('toast');
  el.textContent=msg;
  el.classList.add('show');
  setTimeout(function(){el.classList.remove('show')},2000);
}

function load(){
  var d=localStorage.getItem(DB_KEY);
  return d?JSON.parse(d):{entries:[],topics:{mat:[],tur:[],sos:[],fen:[]},goals:{mat:25,tur:28,sos:12,fen:12},study:[]};
}

function save(d){
  localStorage.setItem(DB_KEY,JSON.stringify(d));
}

function net(d,y){
  return Math.round((d-y/4)*100)/100;
}

// BUILD ENTRY FORM
function buildEntry(){
  document.getElementById('entry-date').valueAsDate=new Date();
  var html='';
  SUBJECTS.forEach(s=>{
    html+='<div class="card" style="border-left:3px solid '+s.c+'">'
      +'<div class="card-title">'+s.n+' (Max '+s.m+')</div>'
      +'<div class="row3">'
      +'<div class="form-group"><label>Doğru</label><input type="number" id="e-'+s.k+'-d" min="0" max="'+s.m+'" oninput="calcNet(\''+s.k+'\')"></div>'
      +'<div class="form-group"><label>Yanlış</label><input type="number" id="e-'+s.k+'-y" min="0" max="'+s.m+'" oninput="calcNet(\''+s.k+'\')"></div>'
      +'<div class="form-group"><label>Boş</label><input type="number" id="e-'+s.k+'-b" min="0" max="'+s.m+'"></div>'
      +'</div>'
      +'<div style="display:flex;justify-content:space-between;padding:8px;background:#070910;border-radius:6px;margin:8px 0;border:1px solid #1e2d3d">'
      +'<span style="font-size:.7rem;color:#5a7a8a">NET</span>'
      +'<span style="font-weight:700;color:'+s.c+'" id="n-'+s.k+'">0.00</span>'
      +'</div>'
      +'<div class="form-group"><label>Yanlış Konular</label><textarea id="e-'+s.k+'-topics" placeholder="Virgülle yaz..." style="min-height:50px;resize:none;font-size:.8rem"></textarea></div>'

```
  +'</div>';
```

});
document.getElementById(‘entry-subjects’).innerHTML=html;
}

function calcNet(k){
var d=parseInt(document.getElementById(‘e-’+k+’-d’).value)||0;
var y=parseInt(document.getElementById(‘e-’+k+’-y’).value)||0;
document.getElementById(‘n-’+k).textContent=net(d,y).toFixed(2);
}

function clearEntryForm(){
SUBJECTS.forEach(s=>{
document.getElementById(‘e-’+s.k+’-d’).value=’’;
document.getElementById(‘e-’+s.k+’-y’).value=’’;
document.getElementById(‘e-’+s.k+’-b’).value=’’;
document.getElementById(‘e-’+s.k+’-topics’).value=’’;
document.getElementById(‘n-’+s.k).textContent=‘0.00’;
document.getElementById(‘st-’+s.k).value=’’;
});
}

function saveEntry(){
var date=document.getElementById(‘entry-date’).value;
if(!date){toast(‘❌ Tarih seçin’);return;}

var d=load();
var entry={id:Date.now(),date:date,name:document.getElementById(‘entry-name’).value.trim()};
var hasData=false;

SUBJECTS.forEach(s=>{
var dg=parseInt(document.getElementById(‘e-’+s.k+’-d’).value)||0;
var yg=parseInt(document.getElementById(‘e-’+s.k+’-y’).value)||0;
var bg=parseInt(document.getElementById(‘e-’+s.k+’-b’).value)||0;
entry[s.k]={d:dg,y:yg,b:bg,n:net(dg,yg)};
if(dg>0||yg>0)hasData=true;

```
var topics=document.getElementById('e-'+s.k+'-topics').value.trim();
if(topics){
  topics.split(/[,\n]+/).forEach(t=>{
    t=t.trim();
    if(!t)return;
    var found=d.topics[s.k].find(x=>x.t.toLowerCase()===t.toLowerCase());
    if(found)found.c=(found.c||1)+1;
    else d.topics[s.k].push({t:t,c:1,done:false});
  });
}

var mins=parseInt(document.getElementById('st-'+s.k).value)||0;
if(mins>0)d.study.push({date:date,subject:s.k,minutes:mins});
```

});

if(!hasData){toast(‘❌ Veri girin’);return;}

d.entries.push(entry);
save(d);
clearEntryForm();
toast(‘✅ Kaydedildi’);
updateDash();
}

function updateDash(){
var d=load();
var last=d.entries.length?d.entries[d.entries.length-1]:null;
var tg=SUBJECTS.reduce((a,s)=>a+(d.goals[s.k]||0),0);

document.getElementById(‘d-goal’).textContent=tg;

if(last){
var tot=SUBJECTS.reduce((a,s)=>a+(last[s.k]?last[s.k].n:0),0);
document.getElementById(‘d-total’).textContent=tot.toFixed(1);
var pct=Math.round(tot/tg*100);
document.getElementById(‘d-pct’).textContent=pct+’%’;
document.getElementById(‘d-prog’).style.width=Math.min(100,pct)+’%’;
}

var html=’’;
SUBJECTS.forEach(s=>{
var nets=[];
d.entries.forEach(e=>{if(e[s.k])nets.push(e[s.k].n);});
var ln=nets.length?nets[nets.length-1]:null;
var avg=nets.length?(nets.reduce((a,b)=>a+b)/nets.length).toFixed(1):null;
html+=’<div class="card" style="border-left:3px solid '+s.c+'">’
+’<div style="font-size:.6rem;color:'+s.c+';text-transform:uppercase;font-weight:700">’+s.n+’</div>’
+’<div style="font-size:1.6rem;font-weight:900;color:'+s.c+';margin:6px 0">’+(ln!==null?ln.toFixed(1):’—’)+’</div>’
+’<div style="font-size:.7rem;color:#5a7a8a">Ort: ‘+(avg||’—’)+’ / ‘+s.m+’</div>’
+’</div>’;
});
document.getElementById(‘d-subjects’).innerHTML=html;

var all=[];
SUBJECTS.forEach(s=>d.topics[s.k].forEach(t=>{if(!t.done)all.push({text:t.t,count:t.c||1,subject:s});}));
all.sort((a,b)=>b.count-a.count);
var w=’’;
all.slice(0,6).forEach(t=>w+=’<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #1e2d3d"><span>’+t.text+’</span><span style="color:'+t.subject.c+';font-weight:700">’+t.count+‘x</span></div>’);
document.getElementById(‘d-weak’).innerHTML=w||’<p style="color:#5a7a8a;font-size:.85rem">Henüz konu yok</p>’;
}

function buildTopics(){
var d=load();
var html=’’;
SUBJECTS.forEach(s=>{
var sorted=[…d.topics[s.k]].sort((a,b)=>(b.c||1)-(a.c||1));
var items=’’;
sorted.forEach((t,i)=>{
items+=’<div class="item'+(t.done?' item-done':'')+'" onclick="toggleTopic(\''+s.k+'\','+i+')">’
+’<span class="item-count">’+( t.c||1)+‘x</span>’
+’<span class="item-name">’+t.t+’</span>’
+’<span style="color:'+s.c+'">’+(t.done?‘✓’:’’)+’</span>’
+’<button class="item-del" onclick="event.stopPropagation();deleteTopic(\''+s.k+'\','+i+')">✕</button>’
+’</div>’;
});
if(!items)items=’<p style="color:#5a7a8a;font-size:.85rem;padding:10px">Henüz konu yok</p>’;

```
html+='<div class="card">'
  +'<div class="card-title">'+s.n+'</div>'
  +items
  +'<div style="display:flex;gap:6px;margin-top:10px">'
  +'<input type="text" id="ti-'+s.k+'" placeholder="Konu ekle..." style="flex:1;padding:8px;background:#070910;border:1px solid #1e2d3d;border-radius:6px;color:#cdd9e5">'
  +'<button class="btn btn-green" onclick="addTopic(\''+s.k+'\')">Ekle</button>'
  +'</div>'
  +'</div>';
```

});
document.getElementById(‘topics-cont’).innerHTML=html;
}

function addTopic(k){
var inp=document.getElementById(‘ti-’+k);
var txt=inp.value.trim();
if(!txt){toast(‘Konu adı girin’);return;}
var d=load();
var found=d.topics[k].find(x=>x.t.toLowerCase()===txt.toLowerCase());
if(found)found.c=(found.c||1)+1;
else d.topics[k].push({t:txt,c:1,done:false});
inp.value=’’;
save(d);
buildTopics();
toast(‘✅ Eklendi’);
}

function toggleTopic(k,i){
var d=load();
var sorted=[…d.topics[k]].sort((a,b)=>(b.c||1)-(a.c||1));
sorted[i].done=!sorted[i].done;
save(d);
buildTopics();
}

function deleteTopic(k,i){
var d=load();
var sorted=[…d.topics[k]].sort((a,b)=>(b.c||1)-(a.c||1));
var idx=d.topics[k].indexOf(sorted[i]);
d.topics[k].splice(idx,1);
save(d);
buildTopics();
toast(‘✅ Silindi’);
}

function saveGoals(){
var d=load();
SUBJECTS.forEach(s=>{
var val=parseInt(document.getElementById(‘g-’+s.k).value)||0;
d.goals[s.k]=val;
});
save(d);
toast(‘✅ Kaydedildi’);
updateGoals();
}

function updateGoals(){
var d=load();
SUBJECTS.forEach(s=>{
var inp=document.getElementById(‘g-’+s.k);
if(inp)inp.value=d.goals[s.k]||0;
});

var html=’’;
SUBJECTS.forEach(s=>{
var nets=[];
d.entries.forEach(e=>{if(e[s.k])nets.push(e[s.k].n);});
var ln=nets.length?nets[nets.length-1]:0;
var g=d.goals[s.k]||0;
var pct=g>0?Math.round(ln/g*100):0;
html+=’<div class="card" style="border-left:3px solid '+s.c+'">’
+’<div class="card-title">’+s.n+’</div>’
+’<div style="display:flex;justify-content:space-between;font-size:.75rem;margin-bottom:8px">’
+’<span>Son: <b>’+(ln?ln.toFixed(1):’—’)+’</b></span>’
+’<span>Hedef: <b>’+g+’</b></span>’
+’</div>’
+’<div style="height:5px;background:#1e2d3d;border-radius:2px;overflow:hidden">’
+’<div style="height:100%;background:'+s.c+';width:'+Math.min(100,pct)+'%;border-radius:2px;transition:width .4s"></div>’
+’</div>’
+’<div style="font-size:.65rem;color:#5a7a8a;margin-top:6px">’+(pct>=100?‘🎉 Hedefe ulaştın!’:’%’+pct)+’</div>’
+’</div>’;
});
document.getElementById(‘goals-display’).innerHTML=html;
}

function updateStudy(){
var d=load();
var html=’’;
SUBJECTS.forEach(s=>{
var tot=d.study.filter(x=>x.subject===s.k).reduce((a,b)=>a+b.minutes,0);
var h=Math.floor(tot/60),m=tot%60;
html+=’<div class="card" style="text-align:center;border-left:3px solid '+s.c+'">’
+’<div style="font-size:.6rem;color:#5a7a8a;text-transform:uppercase">’+s.n+’</div>’
+’<div style="font-size:1.6rem;font-weight:900;color:'+s.c+';margin:6px 0">’+(h>0?h+‘s ‘:’’)+m+‘dk</div>’
+’</div>’;
});
document.getElementById(‘study-cards’).innerHTML=html;
}

function updateHistory(){
var d=load();
var e=[…d.entries].reverse();
if(!e.length){document.getElementById(‘hist’).innerHTML=’<tr><td style="text-align:center;padding:20px;color:#5a7a8a">Henüz deneme yok</td></tr>’;return;}

var html=’<thead><tr><th>Tarih</th>’;
SUBJECTS.forEach(s=>html+=’<th style="color:'+s.c+'">’+s.k.toUpperCase().slice(0,3)+’</th>’);
html+=’<th>Top</th><th></th></tr></thead><tbody>’;

e.forEach(x=>{
var tot=SUBJECTS.reduce((a,s)=>a+(x[s.k]?x[s.k].n:0),0);
var dateStr=new Date(x.date).toLocaleDateString(‘tr-TR’,{day:‘numeric’,month:‘short’});
html+=’<tr><td>’+dateStr+’</td>’;
SUBJECTS.forEach(s=>{
var n=x[s.k]?x[s.k].n:null;
var col=n>=s.m*.7?’#3ddc97’:n>=s.m*.4?’#ffb340’:’#ff5c6a’;
html+=’<td><span style="background:'+col+'18;color:'+col+';padding:2px 4px;border-radius:4px;font-weight:700">’+(n||’—’)+’</span></td>’;
});
html+=’<td style="color:#3ddc97;font-weight:700">’+tot.toFixed(1)+’</td>’;
html+=’<td><button class="item-del" onclick="deleteEntry('+x.id+')">✕</button></td></tr>’;
});
html+=’</tbody>’;
document.getElementById(‘hist’).innerHTML=html;
}

function deleteEntry(id){
var d=load();
d.entries=d.entries.filter(x=>x.id!==id);
save(d);
updateHistory();
toast(‘✅ Silindi’);
}

buildEntry();
updateDash();
</script>

</body>
</html>
